<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/Star 1.png" type="image/png">
    <title>Baxter's Showcase websiste</title>

    <style>
        @font-face {
            font-family: 'Boldonse';
            src: url('fonts/Boldonse-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            font-family: 'Boldonse', Arial, sans-serif;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-text">Baxter's Showcase Website</div>
    </section>

    <div id="popup" class="popup">
        <div class="popup-content">
            <span class="close-btn">&times;</span>
            <p>Check out Baxters Personal Website.</p>
            <a href="https://baxterd.vercel.app" class="visit-btn" target="_blank" rel="noopener noreferrer">Visit</a>
        </div>
    </div>

    <div id="notification" class="notification">
        <p>Check out Baxters Personal Website. <a href="https://baxterd.vercel.app" target="_blank" rel="noopener noreferrer">Visit</a></p>
        <span class="close-notification">&times;</span>
    </div>

    <nav class="menu">
        <button class="menu-toggle" aria-expanded="false" aria-label="Open menu">
            <span class="hamburger"></span>
        </button>
        <ul class="menu-items">
            <li><a href="index.html" class="active">Image Creation</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>

    <script>
        (function(){
            const btn = document.querySelector('.menu-toggle');
            const items = document.querySelector('.menu-items');
            if(!btn || !items) return;
            btn.addEventListener('click', function(){
                const expanded = this.getAttribute('aria-expanded') === 'true';
                this.setAttribute('aria-expanded', String(!expanded));
                items.classList.toggle('open');
            });
        })();
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const popup = document.getElementById('popup');
            const notification = document.getElementById('notification');
            const closeBtn = document.querySelector('.close-btn');
            const closeNotification = document.querySelector('.close-notification');

            setTimeout(() => popup.classList.add('open'), 700);

            closeBtn.addEventListener('click', function() {
                popup.classList.remove('open');
                notification.classList.add('visible');
            });

            closeNotification.addEventListener('click', function() {
                notification.classList.remove('visible');
            });
        });
    </script>

    <section class="topic">
        <div class="topic-title">
            <h4>Image Editing</h4>
        </div>
        <div class="topic-content">
            <div class="topic-card">
                <img src="images/Frame 9.png" alt="change this too!">
                <h2 class="topic-card-text">Character Design</h2>
            </div>
            <div class="topic-card">
                <img src="images/Frame 10.png" alt="change this too!">
                <h2 class="topic-card-text">Snow Flake</h2>
            </div>
            <div class="topic-card">
                <img src="images/Frame 11.png" alt="change this too!">
                <h2 class="topic-card-text">Background</h2>
            </div>
        </div>
    </section>

<!-- Copy and paste the section from above to make your next section -->



    <!-- A Simple Website Footer ------------------------------------------------------------------------------ -->
    <footer class="footer">
        <p>&copy; 2026 Baxter Douglas</p>
    </footer>

<!-- The end of the whole page- no more content after this! -->
</body>
</html>
